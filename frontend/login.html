<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Hệ thống SSI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #6a85f1, #8fd3f4); padding: 16px; }
        .card { background: #fff; padding: 40px; border-radius: 12px; width: 100%; max-width: 440px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; }
        .card h2 { margin-bottom: 20px; color: #333; }
        .button { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; background: #f6851b; color: #fff; font-weight: bold; transition: background 0.3s; }
        .button:hover { background: #e27618; }
        .button:disabled { background: #a0aec0; cursor: not-allowed; }
        .button-secondary { margin-top: 10px; background: #3498db; }
        .button-secondary:hover { background: #2980b9; }
        .button-success { margin-top: 10px; background: #2ecc71; }
        .button-success:hover { background: #27ae60; }
        .button-outline { margin-top: 10px; background: #ecf0f1; color: #2c3e50; }
        .button-outline:hover { background: #dfe6e9; }
        .actions { display: none; margin-top: 16px; flex-direction: column; gap: 8px; }
        .info { margin-top: 20px; text-align: left; font-size: 14px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e9ecef; display: none; word-break: break-all; }
        .info p { margin-bottom: 8px; color: #495057; }
        .info p:last-child { margin-bottom: 0; }
        .info b { color: #212529; }
        .message { margin-top: 15px; font-size: 14px; font-weight: 500; min-height: 1.2em; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Đăng nhập SSI</h2>
        <p style="font-size:13px;color:#666;margin-bottom:16px;text-align:left;">
            Bước 1: Kết nối MetaMask. Hệ thống đọc quyền <b>Creator</b> trực tiếp từ smart contract.
            Vai trò <b>User</b> và <b>Verifier</b> không có trên chuỗi — bạn tự chọn giao diện phù hợp.
        </p>

        <button id="loginBtn" class="button" type="button">
            🦊 Kết nối ví MetaMask
        </button>

        <div id="infoBox" class="info">
            <p><b>Địa chỉ ví:</b> <br><span id="addressDisplay"></span></p>
            <p><b>Mạng (CHAIN_ID):</b> <span id="chainDisplay"></span></p>
            <p><b>Creator trên contract:</b> <span id="creatorDisplay">—</span></p>
        </div>

        <p id="messageDisplay" class="message"></p>

        <div id="actions" class="actions">
            <button id="btnCreator" type="button" class="button button-success" style="display:none;">Vào Creator Dashboard</button>
            <button id="btnUser" type="button" class="button button-secondary">Vào User Dashboard</button>
            <button id="btnVerifier" type="button" class="button button-outline">Vào Verifier Dashboard</button>
        </div>
    </div>

    <script type="module">
        const ZERO = "0x0000000000000000000000000000000000000000";

        /** Minimal ABI — khớp DID_Registry.vy */
        const DID_REGISTRY_ABI = [
            "function isCreator(address addr) view returns (bool)",
        ];

        let currentAddress = "";
        let isCreatorOnChain = false;

        function setMessage(text, color) {
            const el = document.getElementById("messageDisplay");
            el.innerText = text;
            el.style.color = color || "#333";
        }

        async function loadConstants() {
            const mod = await import("/shared/constants.js");
            return {
                DID_REGISTRY_ADDRESS: mod.DID_REGISTRY_ADDRESS,
                CHAIN_ID: Number(mod.CHAIN_ID),
            };
        }

        function chainIdHex(chainId) {
            return "0x" + BigInt(chainId).toString(16);
        }

        async function ensureMetaMaskChain(targetChainId) {
            const hex = chainIdHex(targetChainId);
            try {
                await window.ethereum.request({
                    method: "wallet_switchEthereumChain",
                    params: [{ chainId: hex }],
                });
            } catch (e) {
                if (e?.code === 4902 || e?.data?.originalError?.code === 4902) {
                    const isLocal = targetChainId === 31337;
                    await window.ethereum.request({
                        method: "wallet_addEthereumChain",
                        params: [{
                            chainId: hex,
                            chainName: isLocal ? "Anvil Local" : "Sepolia",
                            nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 },
                            rpcUrls: isLocal
                                ? ["http://127.0.0.1:8545"]
                                : ["https://rpc.sepolia.org"],
                        }],
                    });
                } else {
                    throw e;
                }
            }
        }

        function rememberWallet(addr) {
            try {
                localStorage.setItem("ssi_walletAddress", addr);
            } catch (_) {}
        }

        async function runConnect() {
            const loginBtn = document.getElementById("loginBtn");
            const infoBox = document.getElementById("infoBox");
            const actions = document.getElementById("actions");

            if (!window.ethereum) {
                setMessage("Vui lòng cài MetaMask.", "red");
                return;
            }

            const { DID_REGISTRY_ADDRESS, CHAIN_ID } = await loadConstants();

            if (!DID_REGISTRY_ADDRESS || DID_REGISTRY_ADDRESS === ZERO) {
                setMessage("Chưa cấu hình DID_REGISTRY trong shared/constants.js (deploy contract trước).", "red");
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerText = "Đang kết nối...";
            setMessage("Vui lòng xác nhận trên MetaMask...", "#333");

            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            currentAddress = accounts[0];

            setMessage("Đang chuyển / kiểm tra mạng...", "#333");
            await ensureMetaMaskChain(CHAIN_ID);

            const provider = new ethers.BrowserProvider(window.ethereum);
            const net = await provider.getNetwork();
            const connectedChain = Number(net.chainId);

            if (connectedChain !== CHAIN_ID) {
                throw new Error("Sai mạng: MetaMask đang ở chainId " + connectedChain + ", cần " + CHAIN_ID + ". Hãy chuyển mạng thủ công trong MetaMask.");
            }

            const registry = new ethers.Contract(DID_REGISTRY_ADDRESS, DID_REGISTRY_ABI, provider);
            isCreatorOnChain = await registry.isCreator(currentAddress);

            document.getElementById("addressDisplay").innerText = currentAddress;
            document.getElementById("chainDisplay").innerText = String(CHAIN_ID) + (connectedChain === CHAIN_ID ? " ✓" : "");
            document.getElementById("creatorDisplay").innerText = isCreatorOnChain ? "Có (Identity Creator)" : "Không";
            infoBox.style.display = "block";

            rememberWallet(currentAddress);

            const btnCreator = document.getElementById("btnCreator");
            btnCreator.style.display = isCreatorOnChain ? "block" : "none";

            actions.style.display = "flex";

            setMessage("Kết nối thành công. Chọn giao diện bên dưới.", "green");
            loginBtn.innerText = "Đã kết nối ví";
            loginBtn.style.background = "#28a745";
        }

        document.getElementById("loginBtn").addEventListener("click", async () => {
            const loginBtn = document.getElementById("loginBtn");
            try {
                await runConnect();
            } catch (err) {
                console.error(err);
                setMessage("Lỗi: " + (err?.message || err?.reason || "Không thể kết nối."), "red");
                loginBtn.innerText = "🦊 Kết nối ví MetaMask";
                loginBtn.disabled = false;
                loginBtn.style.background = "";
            }
        });

        document.getElementById("btnCreator").addEventListener("click", () => {
            window.location.href = "creator.html";
        });
        document.getElementById("btnUser").addEventListener("click", () => {
            window.location.href = "user.html";
        });
        document.getElementById("btnVerifier").addEventListener("click", () => {
            window.location.href = "verifier.html";
        });
    </script>
</body>
</html>
