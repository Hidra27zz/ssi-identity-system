<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSI - Identity Verifier</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Identity Verifier Dashboard</h1>
        <p class="subtitle">Kiểm tra tính hợp lệ của định danh</p>

        <div class="card">
            <h2>Xác minh DID</h2>
            <label>Địa chỉ ví cần kiểm tra</label>
            <input type="text" id="verifyAddress" placeholder="0x..." />
            <div style="text-align: center; margin-top: 15px;">
        <button class="btn-red" onclick="verifyDID()">Xác minh</button>
</div>
        </div>

        <div id="verifyResult" class="hidden">
            <div class="card">
                <h2>Kết quả xác minh</h2>
                <p><strong>Địa chỉ:</strong> <span id="resultAddress"></span></p>
                <p><strong>Trạng thái:</strong> <span id="resultStatus" class="status-badge"></span></p>
                <p><strong>DID:</strong> <span id="resultDid"></span></p>
                <p><strong>IPFS CID (Metadata):</strong> <span id="resultCid"></span></p>
                <p><strong>Thời gian kiểm tra:</strong> <span id="resultTime"></span></p>
            </div>
        </div>

        <div class="card">
            <h2>Yêu cầu truy cập dữ liệu</h2>
            <label>DID của chủ sở hữu</label>
            <input type="text" id="ownerDid" placeholder="did:ssi:..." />
            
            <label>Địa chỉ ví của bạn (Verifier)</label>
            <input type="text" id="requesterAddress" placeholder="0x..." />

            <label>Loại dữ liệu cần xem</label>
            <select id="dataType">
                <option value="portrait">Ảnh chân dung</option>
                <option value="document">Tài liệu PDF</option>
                <option value="metadata">Metadata JSON</option>
            </select>
            
            <button onclick="requestConsent()">Gửi yêu cầu truy cập</button>
            <p id="consentResult" style="margin-top: 15px; font-weight: bold;"></p>
        </div>

        <div class="card">
            <h2>Xem dữ liệu đã được cấp quyền</h2>
            <label>Nhập Mã Yêu Cầu (Consent ID) đã được phê duyệt</label>
            <input type="text" id="accessConsentId" placeholder="VD: 12" />
            
            <button onclick="accessData()">Xem Dữ Liệu</button>
            
            <div id="accessResult" class="hidden"></div>
        </div>

    </div> <script type="module" src="js/verifier.js"></script>
</body>
</html>
