<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSI - Identity Creator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Identity Creator Dashboard</h1>
        <p class="subtitle">Xác minh dữ liệu và lưu hash lên blockchain</p>

        <div class="card">
            <h2>Danh sách DID chờ xác minh</h2>
            <button onclick="loadPendingRequests()">Tải danh sách</button>
            <div id="pendingList" style="margin-top: 10px;">
                <p><i>Chưa tải dữ liệu...</i></p>
            </div>
        </div>

        <div class="card">
            <h2>Bước 1: Thông tin người dùng</h2>
            <label>Địa chỉ ví của người dùng</label>
            <input type="text" id="userAddress" placeholder="0x..." />

            <label>DID của người dùng</label>
            <input type="text" id="userDid" placeholder="did:ssi:..." />
        </div>

        <div class="card">
            <h2>Bước 2: Upload tài liệu lên IPFS</h2>

            <label>1. Ảnh chân dung (JPG/PNG, tối đa 5MB)</label>
            <input type="file" id="portraitFile" accept="image/jpeg,image/png" />
            <button onclick="uploadFile('portrait')">Upload ảnh</button>
            <p id="portraitCid" class="cid-display"></p>

            <label>2. File PDF căn cước (tối đa 10MB)</label>
            <input type="file" id="documentFile" accept="application/pdf" />
            <button onclick="uploadFile('document')">Upload PDF</button>
            <p id="documentCid" class="cid-display"></p>

            <label>3. Metadata JSON (Gộp tự động từ Ảnh & PDF)</label>
            <button onclick="uploadMetadata()" class="btn-secondary">Tạo & Upload Metadata JSON</button>
            <p id="metadataCid" class="cid-display"></p>
        </div>

        <div class="card">
            <h2>Bước 3: Gửi hash lên Smart Contract</h2>
            <label>Metadata Hash (tự động điền sau khi upload JSON)</label>
            <input type="text" id="docHash" placeholder="SHA-256 hex..." readonly />

            <label>Metadata IPFS CID (tự động điền)</label>
            <input type="text" id="ipfsCid" placeholder="Qm..." readonly />

            <label>Địa chỉ Creator (của bạn)</label>
            <input type="text" id="creatorAddress" placeholder="0x..." />


            <div style="text-align: center; margin-top: 15px;">
            <button class="btn-red" onclick="storeHash()">Gửi hash lên Blockchain</button>
        </div>
        </div>

        <div id="txStatus" class="status-box hidden"></div>
    </div>

    <script type="module" src="js/creator.js"></script>
</body>
</html>
